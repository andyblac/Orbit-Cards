<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <title>garage-fixed</title>

  <!-- Frame -->
  <path d="M22 9V20H20V11H4V20H2V9L12 5L22 9" fill="currentColor"/>

  <clipPath id="doorClip">
    <rect x="4" y="11" width="16" height="9" />
  </clipPath>

  <g clip-path="url(#doorClip)">

    <!-- Animated group (NO base transform!) -->
    <g>

      <!-- Door panels -->
      <path d="M19 12H5V14H19V12Z" fill="currentColor"/>
      <path d="M19 15H5V17H19V15Z" fill="currentColor"/>
      <path d="M19 18H5V20H19V18Z" fill="currentColor"/>

      <!-- Start OPEN via animation itself -->
      <animateTransform
        attributeName="transform"
        type="translate"
        from="0 -10"
        to="0 0"
        dur="1.5s"
        begin="0s"
        fill="freeze"
      />

    </g>
  </g>
</svg>