<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="120" height="120" fill="currentColor">

  <style>
    .swirl {
      transform-origin: 12px 14px;
      animation: wash 1.5s ease-in-out infinite;
    }

    @keyframes wash {
      0%,100% { transform: rotate(0deg); }
      25%     { transform: rotate(-20deg); }
      75%     { transform: rotate(20deg); }
    }
  </style>

  <!-- machine -->
  <path
    fill="currentColor"
    d="M6,2H18A2,2 0 0,1 20,4V20A2,2 0 0,1 18,22H6A2,2 0 0,1 4,20V4A2,2 0 0,1 6,2
       M7,4A1,1 0 0,0 6,5A1,1 0 0,0 7,6A1,1 0 0,0 8,5A1,1 0 0,0 7,4
       M10,4A1,1 0 0,0 9,5A1,1 0 0,0 10,6A1,1 0 0,0 11,5A1,1 0 0,0 10,4
       M12,8A6,6 0 0,0 6,14A6,6 0 0,0 12,20A6,6 0 0,0 18,14A6,6 0 0,0 12,8Z" />

  <!-- animated inner swirl -->
  <path
    class="swirl"
    fill="currentColor"
    d="M14.83,11.17
       C16.39,12.73 16.39,15.27 14.83,16.83
       C13.27,18.39 10.73,18.39 9.17,16.83
       L14.83,11.17" />
</svg>