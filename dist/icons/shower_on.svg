<?xml version="1.0" encoding="utf-8"?>
<svg width="800px" height="800px" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated shower</title>
  <desc id="desc">A shower head icon with animated falling water droplets.</desc>
  <style>
    .fixture {
      fill: #111111;
    }

    .drop {
      fill: #1597d3;
      opacity: 0;
      transform-box: fill-box;
      transform-origin: center;
      animation: fall 1.35s linear infinite;
    }

    .drop:nth-child(1) { animation-delay: 0s; }
    .drop:nth-child(2) { animation-delay: .18s; }
    .drop:nth-child(3) { animation-delay: .36s; }
    .drop:nth-child(4) { animation-delay: .54s; }
    .drop:nth-child(5) { animation-delay: .72s; }
    .drop:nth-child(6) { animation-delay: .9s; }
    .drop:nth-child(7) { animation-delay: 1.08s; }
    .drop:nth-child(8) { animation-delay: .12s; }
    .drop:nth-child(9) { animation-delay: .3s; }
    .drop:nth-child(10) { animation-delay: .48s; }
    .drop:nth-child(11) { animation-delay: .66s; }
    .drop:nth-child(12) { animation-delay: .84s; }

    @keyframes fall {
      0% {
        opacity: 0;
        transform: translateY(-8px) scale(.72);
      }
      18% {
        opacity: 1;
      }
      72% {
        opacity: .95;
      }
      100% {
        opacity: 0;
        transform: translateY(8px) scale(1);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .drop {
        opacity: 1;
        animation: none;
      }
    }
  </style>

  <path class="fixture" d="M22 0L22 7.28125C22.972656 7.109375 23.972656 7 25 7C26.027344 7 27.027344 7.109375 28 7.28125L28 0 Z M25 9C18.394531 9 12.871094 13.273438 11.40625 19L38.59375 19C37.128906 13.273438 31.605469 9 25 9 Z M10 21C8.347656 21 7 22.347656 7 24C7 25.652344 8.347656 27 10 27L40 27C41.652344 27 43 25.652344 43 24C43 22.347656 41.652344 21 40 21 Z"/>

  <g id="water">
    <circle class="drop" cx="17" cy="32" r="2"/>
    <circle class="drop" cx="25" cy="32" r="2"/>
    <circle class="drop" cx="33" cy="32" r="2"/>
    <circle class="drop" cx="13" cy="40" r="2"/>
    <circle class="drop" cx="21" cy="40" r="2"/>
    <circle class="drop" cx="29" cy="40" r="2"/>
    <circle class="drop" cx="37" cy="40" r="2"/>
    <circle class="drop" cx="9" cy="48" r="2"/>
    <circle class="drop" cx="17" cy="48" r="2"/>
    <circle class="drop" cx="25" cy="48" r="2"/>
    <circle class="drop" cx="33" cy="48" r="2"/>
    <circle class="drop" cx="41" cy="48" r="2"/>
  </g>
</svg>
