<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 24 24">

  <style>
    .arc {
      opacity: 0;
      animation-duration: 2s;
      animation-iteration-count: infinite;
    }

    /* arc 1 appears first and stays on */
    .a1 {
      animation-name: arc1;
    }

    /* arc 2 appears second and stays on */
    .a2 {
      animation-name: arc2;
    }

    /* arc 3 appears third and stays on */
    .a3 {
      animation-name: arc3;
    }

    @keyframes arc1 {
      0%   { opacity: 0; }
      10%  { opacity: 1; }
      75%  { opacity: 1; }
      100% { opacity: 0; }
    }

    @keyframes arc2 {
      0%   { opacity: 0; }
      25%  { opacity: 0; }
      35%  { opacity: 1; }
      75%  { opacity: 1; }
      100% { opacity: 0; }
    }

    @keyframes arc3 {
      0%   { opacity: 0; }
      50%  { opacity: 0; }
      60%  { opacity: 1; }
      75%  { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>

  <!-- RADAR ARCS -->
  <path class="arc a1" fill="currentColor"
    d="M21,1A2,2 0 0,0 23,3V1H21"/>

  <path class="arc a2" fill="currentColor"
    d="M18.33,1C18.33,3.58 20.42,5.67 23,5.67V4.33C21.16,4.33 19.67,2.84 19.67,1H18.33"/>

  <path class="arc a3" fill="currentColor"
    d="M15.67,1A7.33,7.33 0 0,0 23,8.33V7A6,6 0 0,1 17,1H15.67"/>

  <!-- MAIN ICON -->
  <path fill="currentColor"
    d="M10,0.2C9,0.2 8.2,1 8.2,2C8.2,3 9,3.8 10,3.8C11,3.8 11.8,3 11.8,2C11.8,1 11,0.2 10,0.2M7.92,4.03C7.75,4.03 7.58,4.06 7.42,4.11L2,5.8V11H3.8V7.33L5.91,6.67L2,22H3.8L6.67,13.89L9,17V22H10.8V15.59L8.31,11.05L9.04,8.18L10.12,10H15V8.2H11.38L9.38,4.87C9.08,4.37 8.54,4.03 7.92,4.03Z"
  />
</svg>